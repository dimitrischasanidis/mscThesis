services:
  # ── Parliament pipeline ────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    image: reg.dchasanidis.com/parliament-scraper:latest
    container_name: parliament-scraper
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      POLL_INTERVAL_S: "3600"
      LOOKBACK_DAYS: "30"
    volumes:
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      - postgres

  downloader:
    build:
      context: .
      dockerfile: docker/Dockerfile.downloader
    image: reg.dchasanidis.com/parliament-downloader:latest
    container_name: parliament-downloader
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      PDF_CACHE_DIR: "/app/pdfs"
      POLL_INTERVAL_S: "60"
    volumes:
      - ./pdfs:/app/pdfs
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      - postgres

  extractor:
    build:
      context: .
      dockerfile: docker/Dockerfile.extractor
    image: reg.dchasanidis.com/parliament-extractor:latest
    container_name: parliament-extractor
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      PDF_CACHE_DIR: "/app/pdfs"
      POLL_INTERVAL_S: "60"
    volumes:
      - ./pdfs:/app/pdfs
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      - postgres

  # ── Viewer ─────────────────────────────────────────────────────
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    image: reg.dchasanidis.com/parliament-viewer:latest
    container_name: parliament-streamlit
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      PDF_CACHE_DIR: "/app/static"
    ports:
      - "8501:8501"
    volumes:
      - ./pdfs:/app/static
    networks:
      - backend
    depends_on:
      - postgres

networks:
  backend:
