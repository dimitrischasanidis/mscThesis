services:
  # Grafana runs on barad-dur-monitoring stack; disable here
  grafana:
    deploy:
      replicas: 0

  # Loki joins the shared monitoring network so the Grafana on barad-dur can reach it
  loki:
    networks:
      - observability
      - barad-dur-monitoring_default

  # Streamlit: bind-mount source for live code updates from git checkout
  streamlit:
    volumes:
      - ./streamlit_app:/app
      - ${PDFS_HOST_DIR:-./pdfs}:/app/static

  # Extractor: GPU access + persistent EasyOCR model cache
  extractor:
    environment:
      TORCH_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hf-cache:/root/.cache/huggingface

networks:
  barad-dur-monitoring_default:
    external: true
  observability:
  backend:

volumes:
  hf-cache:
