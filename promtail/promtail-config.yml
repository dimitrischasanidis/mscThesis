server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# One entry per service so svc label gets the correct value (not the glob "*")
scrape_configs:
  - job_name: parliament-scraper
    static_configs:
      - targets: [localhost]
        labels:
          job: host-python-scraper
          app: parliament-scraper
          svc: scraper
          __path__: /var/log/parliament-scraper/scraper.jsonl

    pipeline_stages:
      - json:
          expressions:
            level: 'record.level.name'
            message: 'record.message'
            ts_unix: 'record.time.timestamp'
      - timestamp:
          source: ts_unix
          format: Unix
      - labels:
          level:
      - output:
          source: message

  - job_name: parliament-downloader
    static_configs:
      - targets: [localhost]
        labels:
          job: host-python-scraper
          app: parliament-scraper
          svc: downloader
          __path__: /var/log/parliament-scraper/downloader.jsonl

    pipeline_stages:
      - json:
          expressions:
            level: 'record.level.name'
            message: 'record.message'
            ts_unix: 'record.time.timestamp'
      - timestamp:
          source: ts_unix
          format: Unix
      - labels:
          level:
      - output:
          source: message

  - job_name: parliament-extractor
    static_configs:
      - targets: [localhost]
        labels:
          job: host-python-scraper
          app: parliament-scraper
          svc: extractor
          __path__: /var/log/parliament-scraper/extractor.jsonl

    pipeline_stages:
      - json:
          expressions:
            level: 'record.level.name'
            message: 'record.message'
            ts_unix: 'record.time.timestamp'
      - timestamp:
          source: ts_unix
          format: Unix
      - labels:
          level:
      - output:
          source: message
