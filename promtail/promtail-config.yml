server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: host-python-scraper
    static_configs:
      - targets:
          - localhost
        labels:
          job: host-python-scraper
          app: parliament-scraper
          __path__: /var/log/parliament-scraper/*.jsonl

    # Extract service name (scraper / downloader / extractor) from filename
    relabel_configs:
      - source_labels: [__path__]
        regex: /var/log/parliament-scraper/([^/]+)\.jsonl
        target_label: svc

    pipeline_stages:
      # Parse loguru's serialize=True JSONL format
      - json:
          expressions:
            level: 'record.level.name'
            message: 'record.message'
            function: 'record.function'
            ts_unix: 'record.time.timestamp'

      # Use loguru's own timestamp (not ingestion time)
      - timestamp:
          source: ts_unix
          format: Unix

      # Promote level as a Loki label for fast filtering
      # e.g. {job="host-python-scraper", level="ERROR"}
      - labels:
          level:

      # Replace raw JSON blob with the clean message as log line
      - output:
          source: message
