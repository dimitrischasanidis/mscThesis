services:
  # Grafana runs on barad-dur-monitoring stack; disable here
  grafana:
    deploy:
      replicas: 0

  # Loki joins the shared monitoring network so Grafana can reach it
  loki:
    networks:
      - observability
      - barad-dur-monitoring_default

  # Streamlit: bind-mount source for live updates on server
  streamlit:
    volumes:
      - ./streamlit_app:/app
      - ./pdfs:/app/static

networks:
  barad-dur-monitoring_default:
    external: true
  observability:
  backend:
