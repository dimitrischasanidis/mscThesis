name: Deploy to barad-dur

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: reg.dchasanidis.com
  DEPLOY_DIR: /home/dimitris/mscThesis
  COMPOSE: >-
    docker compose
    --project-directory .
    -f docker/compose.infra.yml
    -f docker/compose.app.yml
    -f docker/compose.server.yml
    -f docker/compose.prod.yml

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, barad-dur]
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout (update files on server)
        uses: actions/checkout@v4
        with:
          path: ${{ env.DEPLOY_DIR }}
          clean: false  # never wipe untracked pdfs/, data/, logs/

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login ${{ env.REGISTRY }} \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Pull new images
        working-directory: ${{ env.DEPLOY_DIR }}
        run: ${{ env.COMPOSE }} pull scraper downloader extractor streamlit

      - name: Recreate services
        working-directory: ${{ env.DEPLOY_DIR }}
        run: ${{ env.COMPOSE }} up -d --no-build scraper downloader extractor streamlit

      - name: Verify
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          sleep 5
          ${{ env.COMPOSE }} ps scraper downloader extractor streamlit
