services:
  # ── Observability ──────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    restart: unless-stopped
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/parliament-scraper:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability

  grafana:
    image: grafana/grafana:10.4.5
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      - loki

  # ── Database ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parliament
      POSTGRES_USER: parliament
      POSTGRES_PASSWORD: parliament
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@parliament.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - backend
    depends_on:
      - postgres

  # ── Application services ───────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: reg.dchasanidis.com/recall-scraper:latest
    container_name: recall-scraper
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      POLL_INTERVAL_S: "3600"
      LOOKBACK_DAYS: "30"
    volumes:
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      - postgres

  downloader:
    build:
      context: .
      dockerfile: Dockerfile.downloader
    image: reg.dchasanidis.com/recall-downloader:latest
    container_name: recall-downloader
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      PDF_CACHE_DIR: "/app/pdfs"
      POLL_INTERVAL_S: "60"
    volumes:
      - ./pdfs:/app/pdfs
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      - postgres

  extractor:
    build:
      context: .
      dockerfile: Dockerfile.extractor
    image: reg.dchasanidis.com/recall-extractor:latest
    container_name: recall-extractor
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      PDF_CACHE_DIR: "/app/pdfs"
      POLL_INTERVAL_S: "60"
    volumes:
      - ./pdfs:/app/pdfs
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      - postgres

  streamlit:
    build: ./streamlit_app
    image: reg.dchasanidis.com/recall-viewer:latest
    container_name: streamlit
    restart: unless-stopped
    environment:
      PG_DSN: "host=postgres port=5432 dbname=parliament user=parliament password=parliament"
      PDF_CACHE_DIR: "/app/static"
    ports:
      - "8501:8501"
    volumes:
      - ./pdfs:/app/static
    networks:
      - backend
    depends_on:
      - postgres

networks:
  observability:
  backend:

volumes:
  loki-data:
  promtail_positions:
  grafana-data:
  postgres-data:
  pgadmin-data:
