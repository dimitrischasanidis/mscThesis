services:
  # Remap ports for local dev (avoid conflicts with other local stacks)
  loki:
    ports:
      - "3101:3100"
  grafana:
    ports:
      - "3001:3000"
  postgres:
    ports:
      - "5434:5432"

  # Live-reload streamlit source in local dev
  streamlit:
    volumes:
      - ./streamlit_app:/app
      - ./pdfs:/app/static
